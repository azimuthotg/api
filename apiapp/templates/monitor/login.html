<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor — เข้าสู่ระบบ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container" style="max-width: 420px; margin-top: 12vh;">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h4 class="mb-1 text-center">Monitor การผูกบัญชี</h4>
                <p class="text-muted text-center small mb-4">ระบบติดตามการผูกบัญชี LINE × LDAP (ประตู RFID)</p>

                {% if messages %}
                    {% for message in messages %}
                        <div class="alert alert-danger py-2">{{ message }}</div>
                    {% endfor %}
                {% endif %}

                <form method="post" action="{% url 'monitor_login' %}">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="password" class="form-label">รหัสผ่าน</label>
                        <input type="password" class="form-control" id="password" name="password" autofocus required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">เข้าสู่ระบบ</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
