{% extends 'reservapp/base.html' %}

{% block title %}Home{% endblock %}

{% block content %}
    <h1 class="text-center">ยินดีต้อนรับสู่ LibNPU App</h1>
    <p class="text-center" id="status">Loading...</p>

    <!-- เพิ่ม LIFF SDK เพื่อเชื่อมต่อกับ LINE LIFF -->
    <script src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>

    <script>
        // เมื่อหน้าเว็บโหลดเสร็จ
        document.addEventListener('DOMContentLoaded', function() {
            // เริ่มการเชื่อมต่อกับ LIFF โดยใช้ liff.init
            liff.init({ liffId: "2005939209-8lp790oQ" })   //YOUR_LIFF_ID คือ LIFF ID ที่ได้จาก LINE Developers
            //liff.init({ liffId: "1653777241-BP070q31" })
            .then(() => {
                    // เช็คว่าผู้ใช้ได้เข้าสู่ระบบแล้วหรือไม่
                    if (!liff.isLoggedIn()) {
                        liff.login();  // ถ้ายังไม่ได้เข้าสู่ระบบ จะเรียกใช้การ login
                    } else {
                        // ถ้าเข้าสู่ระบบแล้ว จะดึงข้อมูลโปรไฟล์ผู้ใช้
                        liff.getProfile().then(profile => {
                            const userId = profile.userId;  // ดึง userId จากโปรไฟล์
                            const displayName = profile.displayName;
                            const pictureUrl = profile.pictureUrl;

                            // สร้างฟอร์มเพื่อส่ง userId ไปยัง server ผ่าน POST
                            const form = document.createElement('form');
                            form.method = 'POST';
                            form.action = "{% url 'home' %}";  // ส่งข้อมูลกลับไปที่ view ของ home

                            // เพิ่ม csrf token เพื่อป้องกันการโจมตี CSRF
                            const csrfToken = "{{ csrf_token }}";
                            const inputCsrf = document.createElement('input');
                            inputCsrf.type = 'hidden';
                            inputCsrf.name = 'csrfmiddlewaretoken';
                            inputCsrf.value = csrfToken;
                            form.appendChild(inputCsrf);

                            // เพิ่ม userId ในฟอร์ม
                            const inputUserId = document.createElement('input');
                            inputUserId.type = 'hidden';
                            inputUserId.name = 'userId';
                            inputUserId.value = userId;
                            form.appendChild(inputUserId);

                            const inputDisplayName = document.createElement('input');
                            inputDisplayName.type = 'hidden';
                            inputDisplayName.name = 'displayName';
                            inputDisplayName.value = displayName;
                            form.appendChild(inputDisplayName);

                            const inputPictureUrl = document.createElement('input');
                            inputPictureUrl.type = 'hidden';
                            inputPictureUrl.name = 'pictureUrl';
                            inputPictureUrl.value = pictureUrl;
                            form.appendChild(inputPictureUrl);

                            // เพิ่มฟอร์มลงใน body ของเอกสารและทำการ submit โดยอัตโนมัติ
                            document.body.appendChild(form);
                            form.submit();
                        }).catch(err => {
                            // กรณีเกิดข้อผิดพลาดในการดึงข้อมูลโปรไฟล์
                            document.getElementById("status").textContent = "Failed to get profile: " + err;
                        });
                    }
                })
                .catch(err => {
                    // กรณีเกิดข้อผิดพลาดในการเชื่อมต่อกับ LIFF
                    document.getElementById("status").textContent = "LIFF Initialization failed: " + err;
                });
        });
    </script>
{% endblock %}
